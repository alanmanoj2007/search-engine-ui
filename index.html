<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alsa Search</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Inter:wght@300;400&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="top-nav">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
    </div>

    <div class="main-content">
        
        <h1 class="logo">Alsa</h1>

        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-bar-icon"></i>
            <input type="text" placeholder="Search Alsa or type a url">
        </div>

        <div class="discover-box">
            <div class="discover-header">
                <span>Discover</span>
                <i class="fa-solid fa-magnifying-glass header-search-icon"></i>
            </div>

            <div class="grid">
                <a href="#" class="card"><div class="inner-card">Trending</div></a>
                <a href="#" class="card"><div class="inner-card">News</div></a>
                <a href="#" class="card"><div class="inner-card">Gaming</div></a>
                <a href="#" class="card"><div class="inner-card">Movies</div></a>
                <a href="#" class="card"><div class="inner-card">Music</div></a>
                <a href="#" class="card"><div class="inner-card">Shopping</div></a>
                <a href="#" class="card"><div class="inner-card">Education</div></a>
                <a href="#" class="card"><div class="inner-card">Health</div></a>
                <a href="#" class="card"><div class="inner-card">Travel</div></a>
                <a href="#" class="card"><div class="inner-card">More</div></a>
            </div>
        </div>

    </div>

</body>
</html>
